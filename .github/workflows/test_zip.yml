name: Build windows zip

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: Upload build to GitHub Release (replaces same-named Windows asset only)
        type: boolean
        default: true

permissions:
  contents: write

env:
  # 3.38.2+ required: windows-latest ships VS 2026; older Flutter falls back to VS 2019 (not installed).
  FLUTTER_VERSION: "3.38.10"

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Get version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(sed -n 's/^version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p' app/pubspec.yaml)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build_windows_zip:
    needs: build
    runs-on: windows-2022

    steps:
      - name: Fix long file paths
        run: git config --system core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"

      - name: Dependencies
        working-directory: app
        run: flutter pub get

      - name: Build MSIX helper package
        run: .\scripts\compile_windows_msix_helper.ps1

      - name: Compile for Windows
        working-directory: app
        run: flutter build windows

      - name: Create empty settings.json
        working-directory: app
        run: echo {} > build/windows/x64/runner/Release/settings.json

      - name: Add DLL files
        working-directory: app
        run: |
          Copy-Item ../scripts/windows/x64/msvcp140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140.dll build/windows/x64/runner/Release/
          Copy-Item ../scripts/windows/x64/vcruntime140_1.dll build/windows/x64/runner/Release/

      - name: Zip compiled files
        working-directory: app
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath LocalSend.zip

      - name: Upload zip
        uses: actions/upload-artifact@v6
        with:
          name: windows-zip-x86-64-result
          path: app/LocalSend.zip

  upload_release:
    needs: [build, build_windows_zip]
    if: ${{ inputs.upload_to_release }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          name: windows-zip-x86-64-result
          path: windows-zip-x86-64-result

      - name: Upload Windows zip to release
        uses: ./.github/actions/publish-release-asset
        with:
          tag: v${{ needs.build.outputs.version }}
          assets: windows-zip-x86-64-result/LocalSend.zip#LocalSend-${{ needs.build.outputs.version }}-windows-x86-64.zip
